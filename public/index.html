<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle Climb: Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        button:disabled { background-color: #7f8c8d !important; cursor: not-allowed; opacity: 0.6; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="lobby" class="lobby-container">
        <h1>Riddle Climb</h1>
        <input type="text" id="player-name-input" placeholder="Your Name">
        <button class="menu-btn" onclick="createRoom()">Create Room</button>
        <input type="text" id="room-input" placeholder="Room ID">
        <button class="menu-btn" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="waiting-room" class="lobby-container hidden">
        <h2 id="wait-room-id"></h2>
        <p id="player-count-text">Players Joined: 1/2</p>
        <ul id="player-list" style="color:white; list-style:none;"></ul>
        <button id="start-game-btn" class="menu-btn" onclick="requestStart()" disabled>Start Game</button>
    </div>

    <div id="game-screen" class="game-container hidden">
        <div class="top-bar"><span id="room-display"></span><h1 id="status">Waiting...</h1></div>
        <div id="board" class="board-grid">
            <div id="player1" class="statue red-player"></div>
            <div id="player2" class="statue blue-player"></div>
        </div>
        <button id="roll-btn" class="menu-btn" onclick="playTurn()">Roll for Riddle</button>
    </div>

    <div id="riddle-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="timer-display" style="color:red;">Time Left: 20s</p>
            <p id="riddle-text"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
