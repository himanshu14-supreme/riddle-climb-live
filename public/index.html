<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Riddle Climb: Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby" class="lobby-container">
        <h1>Riddle Climb</h1>
        <div class="controls-box">
            <input type="text" id="player-name-input" placeholder="Enter Your Name">
            <div class="divider">---</div>
            <button class="menu-btn" onclick="createRoom()">Create Room</button>
            <input type="text" id="room-input" placeholder="Enter Room ID">
            <button class="menu-btn" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="waiting-room" class="lobby-container" style="display: none;">
        <h2 id="wait-room-id"></h2>
        <div class="waiting-box">
            <p id="player-count-text">Players Joined: 1/2</p>
            <ul id="player-list" style="list-style: none; padding: 0; color: #fff;"></ul>
            <button id="start-game-btn" class="menu-btn" onclick="requestStart()" disabled>Start Game</button>
        </div>
    </div>

    <div id="game-screen" class="game-container" style="display: none;">
        <div class="top-bar">
            <span id="room-display"></span>
            <h1 id="status">Waiting...</h1>
        </div>
        <div id="board" class="board-grid">
            <div id="player1" class="statue red-player"></div>
            <div id="player2" class="statue blue-player"></div>
        </div>
        <div class="controls">
            <button id="roll-btn" onclick="playTurn()">Roll for Riddle</button>
        </div>
    </div>

    <div id="riddle-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="timer-display">Time Left: 20s</p>
            <p id="riddle-text"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
