<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle Climb: Competitive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby" class="lobby-container">
        <h1>Riddle Climb</h1>
        <input type="text" id="player-name-input" placeholder="Your Name">
        <button class="menu-btn" onclick="createRoom()">Create Room</button>
        <input type="text" id="room-input" placeholder="Room ID">
        <button class="menu-btn" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="waiting-room" class="lobby-container hidden">
        <h2 id="wait-room-id"></h2>
        <p id="player-count-text">Players Joined: 0/2</p>
        <ul id="player-list"></ul>
        <button id="start-game-btn" class="menu-btn" onclick="requestStart()" disabled>Start Game</button>
    </div>

    <div id="game-screen" class="game-container hidden">
        <h1 id="status">Ready!</h1>
        <div id="board" class="board-grid">
            <div id="player1" class="statue red-player"></div>
            <div id="player2" class="statue blue-player"></div>
        </div>
        <button id="roll-btn" class="menu-btn">Roll for Riddle</button>
    </div>

    <div id="riddle-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="timer-display"></p>
            <p id="riddle-text"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
