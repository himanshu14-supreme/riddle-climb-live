<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle Climb: Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="lobby-container">
        <h1>Riddle Climb</h1>
        <p style="color: var(--text-dim); margin-bottom: 20px;">Identify yourself, Traveler.</p>
        <input type="text" id="username-input" placeholder="Enter Nickname" maxlength="15">
        <button class="menu-btn" onclick="handleAuth('guest')">Enter Arena</button>
    </div>

    <div id="lobby" class="lobby-container hidden">
        <div id="user-stats-bar">
            <span id="display-name"></span> | 💰 <span id="coin-count">0</span> | ✨ XP: <span id="xp-count">0</span>
        </div>
        
        <div class="nav-buttons">
            <button class="icon-btn" onclick="openVault()">📦 Vault</button>
            <button class="icon-btn" onclick="openShop()">🛒 Shop</button>
        </div>

        <div class="input-group">
            <div class="capacity-select">
                <label>Arena Size:</label>
                <select id="player-limit">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4">4 Players</option>
                </select>
            </div>
        </div>

        <button class="menu-btn" onclick="createRoom()">Create Arena</button>
        <div class="divider">OR</div>
        <input type="text" id="room-input" placeholder="Enter Room ID" maxlength="6">
        <button class="menu-btn join-variant" onclick="joinRoom()">Join Match</button>
    </div>

    <div id="waiting-room" class="lobby-container hidden">
        <h2 id="wait-room-id" style="color: var(--accent-gold);"></h2>
        <p id="player-count-text">Waiting for rivals...</p>
        <ul id="player-list" class="player-list-ui"></ul>
        <button id="start-game-btn" class="menu-btn" onclick="requestStart()" disabled>Commence Battle</button>
    </div>

    <div id="game-screen" class="game-container hidden">
        <div id="status">The Climb Begins</div>
        <div id="board" class="board-grid">
            <div id="player1" class="statue hidden"></div>
            <div id="player2" class="statue hidden"></div>
            <div id="player3" class="statue hidden"></div>
            <div id="player4" class="statue hidden"></div>
        </div>
        <button id="roll-btn" class="menu-btn roll-variant">Roll for Riddle</button>
    </div>

    <div id="riddle-modal" class="modal">
        <div class="modal-content glass-effect">
            <h3 id="modal-title" style="color: var(--accent-gold);">SPEED ROUND!</h3>
            <p id="timer-display"></p>
            <p id="riddle-text"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="modal-content glass-effect">
            <h2 style="color: var(--accent-gold);">The Armory</h2>
            <div class="shop-grid">
                <div class="shop-item">
                    <div class="preview">🛡️</div>
                    <p>Knight (Fire Sword: Cut rivals -10 steps)</p>
                    <button class="menu-btn" onclick="buyItem('knight', 500)">Buy (500 💰)</button>
                </div>
            </div>
            <button class="menu-btn join-variant" style="margin-top:20px" onclick="closeModal('shop-modal')">Close</button>
        </div>
    </div>

    <div id="vault-modal" class="modal">
        <div class="modal-content glass-effect">
            <h2 style="color: var(--accent-gold);">Your Vault</h2>
            <div id="inventory-list" class="shop-grid"></div>
            <button class="menu-btn join-variant" style="margin-top:20px" onclick="closeModal('vault-modal')">Close</button>
        </div>
    </div>

    <div id="leaderboard-overlay" class="leaderboard-popup hidden">
        <div class="leaderboard-content">
            <h3>Round Standings</h3>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
